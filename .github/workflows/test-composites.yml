name: Test composites

# Smoke tests for composite actions defined in this repo. Runs on
# push to main + PR + manual dispatch. Each job exercises one
# composite action with realistic inputs so we catch breakage
# before downstream consumers do.

on:
  push:
    branches: [main]
    paths:
      - 'actions/**'
      - '.github/workflows/test-composites.yml'
  pull_request:
    paths:
      - 'actions/**'
      - '.github/workflows/test-composites.yml'
  workflow_dispatch:

jobs:
  test-setup-dotnet-with-packages:
    name: setup-dotnet-with-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run composite (with GITHUB_TOKEN fallback)
        uses: ./actions/setup-dotnet-with-packages
        with:
          github-packages-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify dotnet version + source
        shell: bash
        run: |
          dotnet --version
          dotnet nuget list source
          dotnet nuget list source | grep -q 'github-chthonic' || (echo "❌ chthonic NuGet source missing" >&2; exit 1)
          echo "✅ setup-dotnet-with-packages composite OK"

  test-setup-node-with-packages:
    name: setup-node-with-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Create a fixture dir so the composite's package-lock.json cache key
      # has something to hash against (we don't actually run `npm ci`).
      - name: Create fixture working directory
        shell: bash
        run: |
          mkdir -p fixture-web
          cat > fixture-web/package.json <<'EOF'
          {
            "name": "fixture",
            "version": "0.0.0",
            "private": true
          }
          EOF
          # actions/setup-node's cache require an existing lock file at the path.
          touch fixture-web/package-lock.json

      - name: Run composite (with GITHUB_TOKEN fallback, no cache for fixture)
        uses: ./actions/setup-node-with-packages
        with:
          working-directory: fixture-web
          enable-cache: 'false'
          github-packages-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify node version + npm scope mapping
        shell: bash
        run: |
          node --version
          npm --version
          NPMRC_FILE="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Reading $NPMRC_FILE"
          cat "$NPMRC_FILE"
          grep -qE '@chthonicsystems:registry=https://npm\.pkg\.github\.com/?$' "$NPMRC_FILE" \
            || (echo "❌ npm scope mapping missing" >&2; exit 1)
          echo "✅ setup-node-with-packages composite OK"

  test-find-green-beta-commit:
    name: find-green-beta-commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Use this very workflow file as both upstream + caller so we
      # exercise the composite without depending on the consumer's
      # deploy workflows existing yet.
      - name: Run composite
        id: find
        uses: ./actions/find-green-beta-commit
        with:
          upstream-workflow-file: test-composites.yml
          caller-workflow-file: test-composites.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          fail-on-no-upstream: 'false'

      - name: Verify outputs
        shell: bash
        env:
          OUT_SHA: ${{ steps.find.outputs.sha }}
          OUT_PROCEED: ${{ steps.find.outputs.should_proceed }}
          OUT_UPSTREAM_DATE: ${{ steps.find.outputs.upstream-date }}
          OUT_CALLER_DATE: ${{ steps.find.outputs.caller-date }}
        run: |
          echo "sha=${OUT_SHA}"
          echo "should_proceed=${OUT_PROCEED}"
          echo "upstream-date=${OUT_UPSTREAM_DATE}"
          echo "caller-date=${OUT_CALLER_DATE}"
          # When upstream == caller, should_proceed is 'false' because the
          # last successful upstream date == the last successful caller date.
          # Acceptable shape: should_proceed is one of 'true' | 'false'.
          case "${OUT_PROCEED}" in
            true|false) echo "✅ should_proceed has valid shape: ${OUT_PROCEED}" ;;
            *) echo "❌ should_proceed has unexpected shape: ${OUT_PROCEED}" >&2; exit 1 ;;
          esac
          echo "✅ find-green-beta-commit composite OK"
